---
# defaults file for weblogic-bootstrap

oracle_user: oracle
oracle_group: oinstall

oracle_base_dirs:
  - /u01/app/oracle/product
  - /u01/app/oracle/config
  - /u01/app/oracle/domains
  - /u01/app/oracle/logs
  - /u01/app/oracle/scripts
  - /u01/software/jdk
  - /u01/software/weblogic
  - /u01/software/patches

local_installation_weblogic_files:
  - ../weblogic-downloads/weblogic/122140/fmw_12.2.1.4.0_infrastructure.jar
  - ../weblogic-downloads/weblogic/122140/V78170-01.zip
  - ../weblogic-downloads/weblogic/122140/fmw_12.2.1.3.0_infrastructure.jar

local_installation_jdk_files:
  - ../weblogic-downloads/jdk/jdk-8u211-linux-x64.tar.gz

weblogic_silent_file_src: ../scripts/silent.xml
weblogic_orainst_file_src: ../scripts/oraInst.loc
weblogic_create_domain_file_src: ../scripts/createDomain.py

weblogic_software_dir: /u01/software/weblogic
jdk_software_dir: /u01/software/jdk
